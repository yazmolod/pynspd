name: schema-update

on:
  push:
    branches:
      - 3-*
  schedule:
    - cron: '0 0 * * *'

permissions:
  contents: write

defaults:
  run:
    shell: pwsh

jobs:
  check:
    if: github.repository_owner == 'yazmolod'
    runs-on: self-hosted
    steps:
      # https://github.com/actions/runner/issues/686#issuecomment-1636899369
      - name: powershell allow...
        shell: cmd
        run: pwsh -Command "Set-ExecutionPolicy Unrestricted -Scope CurrentUser"

      - uses: actions/checkout@v4
      
      - name: Install the latest version of uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"
          enable-cache: true
          prune-cache: false

      - name: Install the project
        run: uv sync --all-extras --dev

      - name: Run schema update script
        run:
          uv run ./scripts/autogeneration.py && 
          uv run ruff check --fix && 
          uv run ruff check --select I --fix && 
          ruff format

      - uses: tj-actions/verify-changed-files@v20
        id: verify-changed-files

      - name: Update Version
        if: ${{ steps.verify-changed-files.outputs.files_changed }}
        run: uv run hatch version patch

      - name: "Set current date as env variable"
        run: |
          Write-Output "builddate=$((Get-Date).ToString('yyyy-MM-dd'))" >> $Env:GITHUB_OUTPUT
          Write-Output "version=v$(uv run -- python -c "from pynspd import __version__; print(__version__)")_test_tag" >> $Env:GITHUB_OUTPUT
        id: version

      - uses: EndBug/add-and-commit@v9
        if: ${{ steps.verify-changed-files.outputs.files_changed }}
        with:
          message: ${{ steps.version.outputs.builddate }} schema update
          default_author: github_actions
          tag: ${{ steps.version.outputs.version }}