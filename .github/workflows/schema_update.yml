name: schema-update

on:
  push:
    branches:
      - 3-*
  schedule:
    - cron: '0 0 * * *'

permissions:
  contents: write

defaults:
  run:
    shell: pwsh

jobs:
  check:
    if: github.repository_owner == 'yazmolod'
    runs-on: self-hosted
    env:
      # Configure a constant location for the uv cache
      UV_CACHE_DIR: /tmp/.uv-cache
    steps:
      # https://github.com/actions/runner/issues/686#issuecomment-1636899369
      - name: powershell allow...
        shell: cmd
        run: pwsh -Command "Set-ExecutionPolicy Unrestricted -Scope CurrentUser"

      - uses: actions/checkout@v4
      
      - name: Install the latest version of uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"
          # enable-cache: true
          # prune-cache: false

      - name: Restore uv cache
        uses: actions/cache@v4
        with:
          path: ${{ env.UV_CACHE_DIR }}
          key: uv-${{ runner.os }}-${{ hashFiles('uv.lock') }}
          restore-keys: |
            uv-${{ runner.os }}-${{ hashFiles('uv.lock') }}
            uv-${{ runner.os }}

      - name: Install the project
        run: uv sync --all-extras --dev

      - name: Run schema update script
        run:
          uv run ./scripts/autogeneration.py && 
          uv run ruff check --fix && 
          uv run ruff check --select I --fix && 
          ruff format

      - name: "Set current date as env variable"
        run: |
          echo "BUILD_DATE=$((Get-Date).ToString('yyyy-MM-dd'))" >> $GITHUB_ENV
        id: version

      - uses: EndBug/add-and-commit@v9
        with:
          message: ${{ env.BUILD_DATE }} schema update
          default_author: github_actions

      - name: Minimize uv cache
        run: uv cache prune --ci